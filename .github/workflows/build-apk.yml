name: Build Android APK (Live Shell)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Capacitor Sync
        run: |
          mkdir -p out
          echo "<html><body>Sonara Live Shell</body></html>" > out/index.html
          npx cap sync android

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug
        env:
          CAPACITOR_ANDROID_STUDIO_PATH: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sonara-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
