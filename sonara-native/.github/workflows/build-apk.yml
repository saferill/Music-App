name: Build Capacitor Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install root dependencies
        run: npm install

      - name: Build Next.js app
        # Perintah ini akan membuat folder 'out' yang dibutuhkan oleh Capacitor
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: android

      - name: Build Android Release APK
        run: ./gradlew assembleRelease
        working-directory: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sonara-capacitor-release-apk
          # Workflow ini akan menghasilkan APK yang belum ditandatangani (unsigned)
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
